<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Торги по недвижимости</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://api-maps.yandex.ru/2.1/?apikey={{ yandex_maps_key }}&lang=ru_RU"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f0e8;
  --bg-warm: #ece6d9;
  --bg-card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --text-muted: #9b9590;
  --accent: #c44b2b;
  --accent-hover: #a83d22;
  --accent-light: #f0d4c8;
  --green: #2d7a4f;
  --green-light: #d4edda;
  --blue: #2c5282;
  --blue-light: #d4e2f4;
  --gold: #b8860b;
  --gold-light: #fef3c7;
  --border: #d5cfc5;
  --border-light: #e8e2d8;
  --shadow-sm: 0 1px 3px rgba(26,26,26,0.06);
  --shadow-md: 0 4px 12px rgba(26,26,26,0.08);
  --shadow-lg: 0 8px 30px rgba(26,26,26,0.12);
  --radius: 2px;
  --font-display: 'Playfair Display', Georgia, 'Times New Roman', serif;
  --font-body: 'Source Sans 3', 'Segoe UI', system-ui, sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* === HEADER === */
.header {
  background: var(--text);
  color: var(--bg);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 56px;
}

.logo {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--bg);
  text-decoration: none;
}

.logo span { color: var(--accent); }

.header-nav {
  display: flex;
  align-items: center;
  gap: 24px;
}

.header-nav a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.header-nav a:hover { color: var(--bg); }
.header-nav a.active { color: var(--accent); }

.btn-scrape {
  background: var(--accent);
  color: white;
  border: none;
  padding: 8px 20px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-scrape:hover { background: var(--accent-hover); }

/* === STATS BAR === */
.stats-bar {
  background: var(--bg-warm);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}

.stats-bar-inner {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 40px;
  overflow-x: auto;
}

.stat-item {
  display: flex;
  align-items: baseline;
  gap: 8px;
  white-space: nowrap;
}

.stat-number {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.stat-divider {
  width: 1px;
  height: 32px;
  background: var(--border);
}

/* === MAIN LAYOUT === */
.main {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 32px;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 0;
  min-height: calc(100vh - 56px - 57px);
}

/* === SIDEBAR === */
.sidebar {
  padding: 24px 24px 24px 0;
  border-right: 1px solid var(--border);
}

.sidebar-section {
  margin-bottom: 28px;
}

.sidebar-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--text);
}

.filter-group {
  margin-bottom: 16px;
}

.filter-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.filter-input,
.filter-select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  transition: border-color 0.2s;
  outline: none;
}

.filter-input:focus,
.filter-select:focus {
  border-color: var(--accent);
}

.filter-range {
  display: flex;
  align-items: center;
  gap: 8px;
}

.filter-range span {
  color: var(--text-muted);
  font-size: 14px;
}

.filter-range input { flex: 1; }

.btn-filter {
  width: 100%;
  padding: 12px;
  background: var(--text);
  color: var(--bg);
  border: none;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 4px;
}

.btn-filter:hover { background: var(--accent); }

.btn-reset {
  width: 100%;
  padding: 10px;
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-reset:hover {
  border-color: var(--text-secondary);
  color: var(--text);
}

/* === LEGEND === */
.legend-items {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* === MAP AREA === */
.map-area {
  position: relative;
  background: var(--bg-warm);
}

#map {
  width: 100%;
  height: calc(100vh - 56px - 57px);
}

/* === DETAIL PANEL === */
.detail-panel {
  position: absolute;
  right: 0;
  top: 0;
  width: 400px;
  height: 100%;
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  z-index: 50;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}

.detail-panel.open {
  transform: translateX(0);
}

.detail-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  font-size: 24px;
  color: var(--text-muted);
  cursor: pointer;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s;
}

.detail-close:hover { color: var(--text); }

.detail-header {
  padding: 32px 28px 20px;
  border-bottom: 1px solid var(--border-light);
}

.detail-type {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin-bottom: 8px;
}

.detail-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text);
}

.detail-price-block {
  padding: 20px 28px;
  background: var(--bg);
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.detail-price {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
}

.detail-price-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.detail-section {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-light);
}

.detail-section:last-child { border-bottom: none; }

.detail-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 14px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 6px 0;
}

.detail-row-label {
  font-size: 14px;
  color: var(--text-secondary);
}

.detail-row-value {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  text-align: right;
  max-width: 55%;
}

.detail-market {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  background: var(--green-light);
  border-radius: var(--radius);
}

.detail-market-icon {
  font-size: 20px;
}

.detail-market-text {
  flex: 1;
}

.detail-market-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--green);
  font-weight: 600;
}

.detail-market-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
}

.detail-discount {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  font-size: 13px;
  font-weight: 700;
  border-radius: var(--radius);
}

.detail-discount.positive {
  background: var(--green-light);
  color: var(--green);
}

.detail-discount.negative {
  background: #fde8e8;
  color: #c53030;
}

.detail-link {
  display: block;
  text-align: center;
  padding: 14px;
  margin: 0 28px 28px;
  background: var(--text);
  color: var(--bg);
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: background 0.2s;
}

.detail-link:hover { background: var(--accent); }

/* === BADGES === */
.badge {
  display: inline-block;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-radius: var(--radius);
}

.badge-active { background: var(--green-light); color: var(--green); }
.badge-upcoming { background: var(--gold-light); color: var(--gold); }
.badge-completed { background: #e8e2d8; color: var(--text-muted); }
.badge-source {
  background: var(--blue-light);
  color: var(--blue);
  font-size: 10px;
}

/* === RESPONSIVE === */
@media (max-width: 1024px) {
  .main {
    grid-template-columns: 1fr;
  }
  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
  }
  .sidebar-section { margin-bottom: 0; }
  .detail-panel { width: 100%; }
}

@media (max-width: 640px) {
  .header-inner { padding: 0 16px; }
  .stats-bar-inner { padding: 0 16px; gap: 20px; }
  .main { padding: 0 16px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">торги<span>.</span>недвижимость</a>
    <nav class="header-nav">
      <a href="#" class="active">Карта</a>
      <a href="#">Список</a>
      <a href="#">Статистика</a>
      <button class="btn-scrape" id="triggerScrape">Обновить данные</button>
    </nav>
  </div>
</header>

<div class="stats-bar">
  <div class="stats-bar-inner" id="statsBar">
    <div class="stat-item">
      <span class="stat-number" id="statTotal">—</span>
      <span class="stat-label">объектов</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number" id="statActive">—</span>
      <span class="stat-label">активных</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number" id="statDiscount">—</span>
      <span class="stat-label">ср. скидка</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number" id="statTorgi">—</span>
      <span class="stat-label">torgi.gov.ru</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number" id="statGosplan">—</span>
      <span class="stat-label">ГосПлан</span>
    </div>
  </div>
</div>

<main class="main">
  <aside class="sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">Фильтры</h3>

      <div class="filter-group">
        <label class="filter-label">Город</label>
        <input type="text" class="filter-input" id="filterCity" placeholder="Москва, СПб...">
      </div>

      <div class="filter-group">
        <label class="filter-label">Тип объекта</label>
        <select class="filter-select" id="filterType">
          <option value="">Все типы</option>
          <option value="apartment">Квартира</option>
          <option value="house">Дом</option>
          <option value="land">Земельный участок</option>
          <option value="commercial">Коммерческая</option>
          <option value="room">Комната</option>
          <option value="garage">Гараж</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Статус</label>
        <select class="filter-select" id="filterStatus">
          <option value="">Все статусы</option>
          <option value="active">Идут торги</option>
          <option value="upcoming">Скоро начнутся</option>
          <option value="completed">Завершены</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Источник</label>
        <select class="filter-select" id="filterSource">
          <option value="">Все источники</option>
          <option value="torgi_gov">torgi.gov.ru</option>
          <option value="gosplan">ГосПлан</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Цена, ₽</label>
        <div class="filter-range">
          <input type="number" class="filter-input" id="priceMin" placeholder="От">
          <span>—</span>
          <input type="number" class="filter-input" id="priceMax" placeholder="До">
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Период</label>
        <select class="filter-select" id="filterDays">
          <option value="7">Неделя</option>
          <option value="30" selected>Месяц</option>
          <option value="90">Квартал</option>
          <option value="365">Год</option>
        </select>
      </div>

      <button class="btn-filter" id="applyFilters">Показать</button>
      <button class="btn-reset" id="resetFilters">Сбросить</button>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title">Легенда</h3>
      <div class="legend-items">
        <div class="legend-item"><span class="legend-dot" style="background:#c44b2b"></span>Сегодня</div>
        <div class="legend-item"><span class="legend-dot" style="background:#d97706"></span>1–3 дня</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ca8a04"></span>4–7 дней</div>
        <div class="legend-item"><span class="legend-dot" style="background:#16a34a"></span>2–4 недели</div>
        <div class="legend-item"><span class="legend-dot" style="background:#2563eb"></span>1–3 месяца</div>
        <div class="legend-item"><span class="legend-dot" style="background:#7c3aed"></span>3+ месяцев</div>
      </div>
    </div>
  </aside>

  <div class="map-area">
    <div id="map"></div>

    <div class="detail-panel" id="detailPanel">
      <button class="detail-close" id="closeDetail">✕</button>
      <div class="detail-header">
        <div class="detail-type" id="detailType">—</div>
        <h2 class="detail-title" id="detailTitle">—</h2>
      </div>
      <div class="detail-price-block">
        <span class="detail-price" id="detailPrice">—</span>
        <span class="detail-price-label">начальная цена</span>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>
</main>

<script>
const TYPE_LABELS = {
  apartment: 'Квартира', house: 'Дом', land: 'Участок',
  commercial: 'Коммерческая', room: 'Комната', garage: 'Гараж', other: 'Другое'
};
const STATUS_LABELS = {
  active: ['Идут торги', 'badge-active'],
  upcoming: ['Скоро', 'badge-upcoming'],
  completed: ['Завершены', 'badge-completed'],
  cancelled: ['Отменены', 'badge-completed']
};
const SOURCE_LABELS = {
  torgi_gov: 'torgi.gov.ru', gosplan: 'ГосПлан'
};

function getColorByDate(d) {
  if (!d) return '#7c3aed';
  const days = Math.floor((Date.now() - new Date(d)) / 86400000);
  if (days <= 0) return '#c44b2b';
  if (days <= 3) return '#d97706';
  if (days <= 7) return '#ca8a04';
  if (days <= 28) return '#16a34a';
  if (days <= 90) return '#2563eb';
  return '#7c3aed';
}

function formatPrice(p) {
  if (!p) return '—';
  return new Intl.NumberFormat('ru-RU').format(Math.round(p)) + ' ₽';
}

function formatShort(p) {
  if (!p) return '—';
  if (p >= 1e6) return (p / 1e6).toFixed(1) + ' млн';
  if (p >= 1e3) return (p / 1e3).toFixed(0) + ' тыс';
  return p.toFixed(0);
}

function makeSvg(color, big) {
  const s = big ? 36 : 28;
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s*1.4}" viewBox="0 0 24 34"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 22 12 22s12-13 12-22C24 5.4 18.6 0 12 0z" fill="${color}"/><circle cx="12" cy="11" r="5.5" fill="white"/><circle cx="12" cy="11" r="2.5" fill="${color}"/></svg>`)}`;
}

let map, clusterer, allData = [], currentFilters = {};

async function initMap() {
  return new Promise(resolve => {
    ymaps.ready(() => {
      map = new ymaps.Map('map', {
        center: [55.7558, 37.6173], zoom: 10,
        controls: ['zoomControl', 'searchControl', 'typeControl']
      });
      clusterer = new ymaps.Clusterer({
        preset: 'islands#invertedDarkClusterIcons',
        groupByCoordinates: false, gridSize: 80
      });
      map.geoObjects.add(clusterer);
      resolve();
    });
  });
}

async function loadData() {
  const p = new URLSearchParams();
  if (currentFilters.city) p.set('city', currentFilters.city);
  if (currentFilters.type) p.set('property_type', currentFilters.type);
  if (currentFilters.status) p.set('status', currentFilters.status);
  if (currentFilters.source) p.set('source', currentFilters.source);
  if (currentFilters.days) p.set('days', currentFilters.days);
  try {
    const r = await fetch('/api/map-data?' + p);
    allData = await r.json();
    renderMarkers();
  } catch(e) { console.error(e); }
}

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const s = await r.json();
    document.getElementById('statTotal').textContent = s.total;
    document.getElementById('statActive').textContent = s.by_status.active || 0;
    document.getElementById('statDiscount').textContent = s.avg_discount ? s.avg_discount.toFixed(1) + '%' : '—';
    document.getElementById('statTorgi').textContent = s.by_source.torgi_gov || 0;
    document.getElementById('statGosplan').textContent = s.by_source.gosplan || 0;
  } catch(e) {}
}

function renderMarkers() {
  clusterer.removeAll();
  const marks = allData.map(p => {
    const color = getColorByDate(p.publish_date);
    const big = p.discount_pct && p.discount_pct > 20;
    const pm = new ymaps.Placemark([p.lat, p.lon], {
      balloonContent: makeBalloon(p),
      clusterCaption: p.title || 'Объект'
    }, {
      iconLayout: 'default#image',
      iconImageHref: makeSvg(color, big),
      iconImageSize: big ? [36, 50] : [28, 40],
      iconImageOffset: big ? [-18, -50] : [-14, -40]
    });
    pm.events.add('click', () => showDetail(p));
    return pm;
  });
  clusterer.add(marks);
  if (marks.length) map.setBounds(clusterer.getBounds(), { checkZoomRange: true, zoomMargin: 40 });
}

function makeBalloon(p) {
  const [sl, sc] = STATUS_LABELS[p.status] || ['—', ''];
  let disc = '';
  if (p.discount_pct != null) {
    const cls = p.discount_pct > 0 ? 'positive' : 'negative';
    disc = `<div style="margin-top:6px"><span class="detail-discount ${cls}">${p.discount_pct > 0 ? '−' : '+'}${Math.abs(p.discount_pct).toFixed(1)}%</span></div>`;
  }
  return `<div style="min-width:220px;font-family:Source Sans 3,sans-serif">
    <div style="font-size:14px;font-weight:600;margin-bottom:6px">${p.title || '—'}</div>
    <div style="font-family:Playfair Display,serif;font-size:18px;font-weight:700;color:#2d7a4f">${formatPrice(p.price)}</div>
    ${p.market_price ? `<div style="font-size:12px;color:#6b6560;margin-top:2px">Рынок: ${formatPrice(p.market_price)}</div>` : ''}
    ${disc}
    <div style="font-size:12px;color:#6b6560;margin-top:6px">${TYPE_LABELS[p.type] || p.type || '—'}${p.area ? ' · '+p.area+' м²' : ''}${p.rooms ? ' · '+p.rooms+' комн.' : ''}</div>
    ${p.url ? `<a href="${p.url}" target="_blank" style="display:inline-block;margin-top:8px;font-size:12px;color:#2c5282">Открыть →</a>` : ''}
  </div>`;
}

function showDetail(p) {
  const panel = document.getElementById('detailPanel');
  document.getElementById('detailType').textContent = TYPE_LABELS[p.type] || p.type || 'Объект';
  document.getElementById('detailTitle').textContent = p.title || p.address || 'Без названия';
  document.getElementById('detailPrice').textContent = formatPrice(p.price);

  const [sl, sc] = STATUS_LABELS[p.status] || ['—', ''];
  let html = `<div class="detail-section">
    <div class="detail-section-title">Информация о торгах</div>
    <div class="detail-row"><span class="detail-row-label">Статус</span><span class="detail-row-value"><span class="badge ${sc}">${sl}</span></span></div>
    ${p.area ? `<div class="detail-row"><span class="detail-row-label">Площадь</span><span class="detail-row-value">${p.area} м²</span></div>` : ''}
    ${p.rooms ? `<div class="detail-row"><span class="detail-row-label">Комнат</span><span class="detail-row-value">${p.rooms}</span></div>` : ''}
    <div class="detail-row"><span class="detail-row-label">Опубликовано</span><span class="detail-row-value">${p.publish_date || '—'}</span></div>
    <div class="detail-row"><span class="detail-row-label">Источник</span><span class="detail-row-value"><span class="badge badge-source">${SOURCE_LABELS[p.source] || p.source}</span></span></div>
  </div>`;

  if (p.market_price) {
    const d = p.discount_pct;
    const cls = d > 0 ? 'positive' : 'negative';
    html += `<div class="detail-section">
      <div class="detail-section-title">Рыночная оценка</div>
      <div class="detail-market">
        <span class="detail-market-icon">📊</span>
        <div class="detail-market-text">
          <div class="detail-market-label">Рыночная цена</div>
          <div class="detail-market-value">${formatPrice(p.market_price)}</div>
        </div>
      </div>
      ${d != null ? `<div style="margin-top:12px"><span class="detail-discount ${cls}">${d > 0 ? '−' : '+'}${Math.abs(d).toFixed(1)}% от рынка</span></div>` : ''}
    </div>`;
  }

  if (p.url) {
    html += `<a href="${p.url}" target="_blank" class="detail-link">Открыть на ${SOURCE_LABELS[p.source] || 'источнике'} →</a>`;
  }

  document.getElementById('detailContent').innerHTML = html;
  panel.classList.add('open');
}

function hideDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

function bindEvents() {
  document.getElementById('applyFilters').onclick = () => {
    currentFilters = {
      city: document.getElementById('filterCity').value,
      type: document.getElementById('filterType').value,
      status: document.getElementById('filterStatus').value,
      source: document.getElementById('filterSource').value,
      days: document.getElementById('filterDays').value,
    };
    loadData();
  };
  document.getElementById('resetFilters').onclick = () => {
    ['filterCity','filterType','filterStatus','filterSource','priceMin','priceMax'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('filterDays').value = '30';
    currentFilters = {};
    loadData();
  };
  document.getElementById('closeDetail').onclick = hideDetail;
  document.getElementById('triggerScrape').onclick = async () => {
    const btn = document.getElementById('triggerScrape');
    btn.textContent = 'Запуск...';
    btn.disabled = true;
    try {
      await fetch('/api/scrape/trigger', { method: 'POST' });
      btn.textContent = 'Сбор запущен';
      setTimeout(() => { loadData(); loadStats(); btn.textContent = 'Обновить данные'; btn.disabled = false; }, 30000);
    } catch(e) {
      btn.textContent = 'Ошибка';
      setTimeout(() => { btn.textContent = 'Обновить данные'; btn.disabled = false; }, 3000);
    }
  };
  document.addEventListener('keydown', e => { if (e.key === 'Escape') hideDetail(); });
}

async function main() {
  await initMap();
  bindEvents();
  await Promise.all([loadData(), loadStats()]);
}

main();
</script>
</body>
</html>
