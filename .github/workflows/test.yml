name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r scraper-worker/requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite pydantic[email]

      - name: Run API tests
        env:
          USE_SQLITE: "true"
          DEBUG: "true"
        run: |
          cd api
          python -m pytest ../tests/test_api_routes.py ../tests/test_models.py -v --tb=short

      - name: Run scraper tests
        env:
          USE_SQLITE: "true"
          DEBUG: "true"
        run: |
          cd scraper-worker
          python -m pytest ../tests/test_base_scraper.py ../tests/test_cian_scraper.py ../tests/test_torgi_scraper.py ../tests/test_proxy_manager.py -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check api/ scraper-worker/ tests/ --select E,F,W --ignore E501
