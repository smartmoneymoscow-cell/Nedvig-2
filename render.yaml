services:
  # ─── API Service ───────────────────────────────────────────
  - type: web
    name: nedvig-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nedvig-db
          property: connectionString
      - key: ADMIN_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://smartmoneymoscow-cell.github.io"
      - key: SCRAPER_WORKER_URL
        value: "http://nedvig-scraper:8001"
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
    autoDeploy: true

  # ─── Scraper Worker ────────────────────────────────────────
  - type: worker
    name: nedvig-scraper
    runtime: docker
    dockerfilePath: ./scraper-worker/Dockerfile
    dockerContext: ./scraper-worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nedvig-db
          property: connectionString
      - key: SCRAPE_INTERVAL_HOURS
        value: "6"
      - key: USE_TOR
        value: "true"
      - key: DEBUG
        value: "false"
    autoDeploy: true

# ─── Database ──────────────────────────────────────────────
databases:
  - name: nedvig-db
    plan: free
    databaseName: estate_auction
