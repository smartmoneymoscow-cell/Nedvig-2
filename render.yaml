services:
  # API Service
  - type: web
    name: nedvig-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nedvig-db
          property: connectionString
      - key: ADMIN_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://smartmoneymoscow-cell.github.io"
      - key: DEBUG
        value: "false"
    healthCheckPath: /health

  # Scraper Worker
  - type: worker
    name: nedvig-scraper
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./scraper-worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nedvig-db
          property: connectionString
      - key: SCRAPE_INTERVAL_HOURS
        value: "6"
      - key: USE_TOR
        value: "true"
      - key: DEBUG
        value: "false"

databases:
  - name: nedvig-db
    plan: free
    databaseName: estate_auction
    # NOTE: Free tier deletes data after 90 days.
    # For production, use external DB (Neon, Supabase) or upgrade plan.
