services:
  - type: web
    name: nedvig-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nedvig-db
          property: connectionString
      - key: ADMIN_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://smartmoneymoscow-cell.github.io"
      - key: DEBUG
        value: "false"
    healthCheckPath: /health

databases:
  - name: nedvig-db
    plan: free
    databaseName: estate_auction
    user: nedvig
