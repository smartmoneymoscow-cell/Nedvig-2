version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nedvig_postgres
    environment:
      POSTGRES_DB: estate_auction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nedvig_api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: estate_auction
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app

  scraper-worker:
    build:
      context: ./scraper-worker
      dockerfile: Dockerfile
    container_name: nedvig_scraper
    ports:
      - "8001:8001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: estate_auction
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-6}
      USE_TOR: "false"
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scraper-worker:/app

volumes:
  pgdata:
